name: CD

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v7
      - name: Install PNPM
        uses: pnpm/action-setup@v6
        with:
          version: 11
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"
      - name: Install and test
        run: pnpm install-test --frozen-lockfile
      - name: Publish
        uses: JS-DevTools/npm-publish@v4
        with:
          provenance: true
          ignore-scripts: true
